<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ilariya & Isaiah's Bible Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* ─── SCENE BACKGROUND ────────────────────────────────── */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(to bottom,
        #4ec9f0 0%,   /* bright sky top */
        #87ddf5 35%,  /* sky mid */
        #c4f0fb 55%,  /* sky horizon glow */
        #a8e6f0 70%,  /* lake reflection */
        #5bc8ea 80%,  /* lake */
        #ffd89b 92%,  /* sandy beach */
        #f5c06a 100%  /* sand bottom */
      );
    }

    /* Sun */
    .sun {
      position: fixed; z-index: 1;
      top: 36px; right: 9%;
      width: 88px; height: 88px; border-radius: 50%;
      background: #ffe566;
      box-shadow: 0 0 0 16px rgba(255,229,102,0.25),
                  0 0 0 32px rgba(255,229,102,0.12),
                  0 0 60px rgba(255,200,50,0.4);
      animation: sunPulse 4s ease-in-out infinite alternate;
    }
    @keyframes sunPulse {
      from { box-shadow: 0 0 0 14px rgba(255,229,102,0.25), 0 0 0 28px rgba(255,229,102,0.10), 0 0 50px rgba(255,200,50,0.35); }
      to   { box-shadow: 0 0 0 20px rgba(255,229,102,0.28), 0 0 0 40px rgba(255,229,102,0.13), 0 0 80px rgba(255,200,50,0.5); }
    }

    /* Clouds */
    .cloud {
      position: fixed; z-index: 1; pointer-events: none;
      animation: drift linear infinite alternate;
    }
    @keyframes drift {
      from { transform: translateX(-12px); }
      to   { transform: translateX(12px); }
    }
    .cloud-body {
      position: relative;
      background: white; border-radius: 60px;
    }
    .cloud-body::before,
    .cloud-body::after {
      content: ''; position: absolute; background: white; border-radius: 50%;
    }

    /* SVG mountain scene - bottom */
    .mountains {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 2;
      pointer-events: none;
    }

    /* Lake shimmer */
    .lake-shimmer {
      position: fixed; z-index: 3; pointer-events: none;
      bottom: 17%; left: 0; width: 100%; height: 4px;
      background: linear-gradient(to right,
        transparent 0%, rgba(255,255,255,0.6) 30%,
        rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.5) 70%, transparent 100%);
      animation: shimmer 2.5s ease-in-out infinite alternate;
    }
    @keyframes shimmer {
      from { opacity: 0.4; transform: scaleX(0.95); }
      to   { opacity: 0.9; transform: scaleX(1.02); }
    }

    /* ─── PAGE LAYOUT ─────────────────────────────────────── */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 24px 60px;
    }

    /* ─── NAV ─────────────────────────────────────────────── */
    nav {
      width: 100%; max-width: 920px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 0;
    }
    .logo { font-size: 22px; font-weight: 900; color: #1a3a5c; letter-spacing: -0.5px; }
    .logo span { color: #ff6b35; }
    .nav-btn {
      background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      border: none; border-radius: 50px; padding: 9px 20px;
      font-size: 13px; font-weight: 800; color: #1a3a5c;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      transition: background 0.2s, transform 0.15s;
    }
    .nav-btn:hover { background: white; transform: scale(1.04); }

    /* ─── HERO ────────────────────────────────────────────── */
    .hero {
      margin-top: 36px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
      border-radius: 50px; padding: 7px 20px;
      font-size: 12px; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; color: #1a6fa8;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: clamp(38px, 7vw, 66px); font-weight: 900;
      line-height: 1.0; letter-spacing: -1.5px; color: #1a3a5c;
      text-shadow: 0 3px 16px rgba(26,58,92,0.12);
    }
    h1 em { font-style: normal; color: #ff6b35; }
    .hero-sub {
      font-size: clamp(14px, 2.5vw, 17px); font-weight: 700;
      color: #2a5a7c; max-width: 460px; line-height: 1.55;
    }

    /* ─── CARDS ───────────────────────────────────────────── */
    .cards {
      margin-top: 36px;
      width: 100%; max-width: 920px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
    }
    @media (max-width: 580px) {
      .cards { grid-template-columns: 1fr; max-width: 400px; }
    }

    .card {
      background: white; border-radius: 24px; overflow: hidden;
      border: none; text-align: left; padding: 0; cursor: pointer;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(26,58,92,0.15), 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
      animation: cardIn 0.55s cubic-bezier(.34,1.56,.64,1) both;
    }
    .card:nth-child(1) { animation-delay: 0.12s; }
    .card:nth-child(2) { animation-delay: 0.26s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 52px rgba(26,58,92,0.22), 0 4px 16px rgba(0,0,0,0.1);
    }
    .card:active { transform: scale(0.98); }

    /* Card art band */
    .card-art {
      position: relative; height: 190px;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; padding-bottom: 14px;
    }
    .card-art-inner { position: relative; z-index: 1; display: flex; gap: 6px; align-items: flex-end; }
    .icon-float {
      font-size: 46px; line-height: 1;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
      animation: iconFloat var(--d,3s) ease-in-out infinite alternate;
    }
    .icon-float.big { font-size: 60px; }
    @keyframes iconFloat {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    /* OT gradient: warm sunny desert/sandstone */
    .card-ot .card-art { background: linear-gradient(160deg, #ff9a3c 0%, #ff7043 40%, #ffd54f 100%); }

    /* NT gradient: cool lake-blue sky */
    .card-nt .card-art { background: linear-gradient(160deg, #29b6f6 0%, #0288d1 45%, #7c4dff 100%); }

    /* Story count badge */
    .count-badge {
      position: absolute; top: 14px; right: 14px; z-index: 2;
      background: rgba(255,255,255,0.28); backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50px; padding: 5px 13px;
      font-size: 11px; font-weight: 800; color: white;
      letter-spacing: 0.04em;
    }

    /* Card body */
    .card-body {
      padding: 22px 24px 26px;
      display: flex; flex-direction: column; gap: 10px; flex: 1;
    }

    .card-tag {
      display: inline-block; border-radius: 8px;
      padding: 4px 12px; font-size: 11px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.1em; width: fit-content;
    }
    .card-ot .card-tag { background: #fff3e0; color: #e65100; }
    .card-nt .card-tag { background: #e3f2fd; color: #0277bd; }

    .card-title {
      font-size: clamp(22px, 3.5vw, 28px); font-weight: 900;
      color: #1a3a5c; line-height: 1.1; letter-spacing: -0.5px;
    }

    .card-desc {
      font-size: 13px; font-weight: 600; color: #4a6a80;
      line-height: 1.6; margin-top: -2px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 11px; font-weight: 700; padding: 5px 12px;
      border-radius: 50px;
    }
    .card-ot .chip { background: #fff8f0; color: #bf5000; border: 1.5px solid #ffd0a0; }
    .card-nt .chip { background: #f0f8ff; color: #015f99; border: 1.5px solid #a0d4f5; }

    .card-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 50px; border: none;
      font-size: 15px; font-weight: 900; font-family: inherit;
      cursor: pointer; margin-top: 4px; width: fit-content; color: white;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
      letter-spacing: 0.02em;
    }
    .card-ot .card-cta { background: linear-gradient(135deg, #ff7043, #ff9a3c); box-shadow: 0 4px 16px rgba(255,112,67,0.4); }
    .card-nt .card-cta { background: linear-gradient(135deg, #0288d1, #29b6f6); box-shadow: 0 4px 16px rgba(2,136,209,0.4); }
    .card-cta:hover { transform: scale(1.06); }
    .card:hover .card-cta { transform: scale(1.04); }
    .cta-arrow { transition: transform 0.2s; }
    .card:hover .cta-arrow { transform: translateX(4px); }

    /* ─── FOOTER ──────────────────────────────────────────── */
    .footer {
      margin-top: 36px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .footer-badge {
      background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
      border-radius: 50px; padding: 8px 22px;
      font-size: 12px; font-weight: 800; color: #2a5a7c;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .footer-hint { font-size: 12px; font-weight: 700; color: rgba(26,58,92,0.5); }
  </style>
</head>
<body>

  <!-- ── Scene ──────────────────────────────────────────────── -->
  <div class="scene" aria-hidden="true"></div>

  <div class="sun" aria-hidden="true"></div>

  <!-- Clouds -->
  <div class="cloud" style="top:55px; left:7%; animation-duration:8s; animation-delay:0s;" aria-hidden="true">
    <div class="cloud-body" style="width:110px; height:36px;">
      <div style="position:absolute;width:52px;height:52px;border-radius:50%;background:white;top:-26px;left:16px;"></div>
      <div style="position:absolute;width:38px;height:38px;border-radius:50%;background:white;top:-18px;left:52px;"></div>
    </div>
  </div>
  <div class="cloud" style="top:40px; left:38%; animation-duration:11s; animation-delay:2s; transform:scale(0.7);" aria-hidden="true">
    <div class="cloud-body" style="width:110px; height:36px;">
      <div style="position:absolute;width:52px;height:52px;border-radius:50%;background:white;top:-26px;left:16px;"></div>
      <div style="position:absolute;width:38px;height:38px;border-radius:50%;background:white;top:-18px;left:52px;"></div>
    </div>
  </div>
  <div class="cloud" style="top:80px; right:14%; animation-duration:9s; animation-delay:1s; transform:scale(0.85);" aria-hidden="true">
    <div class="cloud-body" style="width:110px; height:36px;">
      <div style="position:absolute;width:52px;height:52px;border-radius:50%;background:white;top:-26px;left:16px;"></div>
      <div style="position:absolute;width:38px;height:38px;border-radius:50%;background:white;top:-18px;left:52px;"></div>
    </div>
  </div>

  <!-- Mountain / lake SVG scene -->
  <svg class="mountains" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <!-- Far mountains: soft lavender -->
    <path d="M0,280 C80,240 160,265 250,235 C340,205 420,250 520,220 C620,190 700,230 820,205 C940,180 1020,225 1140,200 C1260,175 1360,215 1440,200 L1440,360 L0,360 Z" fill="#c9b8e8"/>
    <!-- Snow caps on far mountains -->
    <path d="M250,235 L268,200 L286,235 Z" fill="white" opacity="0.8"/>
    <path d="M520,220 L540,185 L560,220 Z" fill="white" opacity="0.8"/>
    <path d="M820,205 L843,168 L866,205 Z" fill="white" opacity="0.8"/>
    <path d="M1140,200 L1162,163 L1184,200 Z" fill="white" opacity="0.8"/>

    <!-- Mid mountains: bright green -->
    <path d="M0,310 L60,265 L130,300 L210,250 L300,285 L390,240 L490,275 L600,230 L710,265 L820,220 L940,258 L1060,218 L1180,255 L1300,225 L1440,255 L1440,360 L0,360 Z" fill="#6dbf6d"/>
    <!-- Trees on mid mountains -->
    <polygon points="90,295 104,265 118,295" fill="#3d8a3d"/>
    <polygon points="450,270 463,245 476,270" fill="#3d8a3d"/>
    <polygon points="750,255 763,230 776,255" fill="#3d8a3d"/>
    <polygon points="1100,245 1113,220 1126,245" fill="#3d8a3d"/>
    <polygon points="1350,238 1363,213 1376,238" fill="#3d8a3d"/>

    <!-- Near hills: darker green foreground -->
    <path d="M0,340 Q180,310 360,335 Q540,310 720,338 Q900,312 1080,336 Q1260,314 1440,332 L1440,360 L0,360 Z" fill="#4a9e4a"/>

    <!-- Lake: bright blue strip -->
    <path d="M0,330 Q240,322 480,328 Q720,322 960,328 Q1200,322 1440,328 L1440,360 L0,360 Z" fill="#5bc8ea" opacity="0.85"/>
    <!-- Lake shimmer lines -->
    <line x1="100" y1="342" x2="280" y2="342" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="400" y1="348" x2="600" y2="348" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="750" y1="340" x2="950" y2="340" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="1100" y1="346" x2="1300" y2="346" stroke="white" stroke-width="1" opacity="0.4"/>

    <!-- Sandy beach at bottom -->
    <path d="M0,354 Q360,348 720,352 Q1080,348 1440,354 L1440,360 L0,360 Z" fill="#ffd89b"/>

    <!-- Birds -->
    <path d="M340,120 Q346,115 352,120 Q358,115 364,120" fill="none" stroke="#2a5a7c" stroke-width="2" stroke-linecap="round"/>
    <path d="M680,95 Q686,90 692,95 Q698,90 704,95"  fill="none" stroke="#2a5a7c" stroke-width="2" stroke-linecap="round"/>
    <path d="M1020,108 Q1026,103 1032,108 Q1038,103 1044,108" fill="none" stroke="#2a5a7c" stroke-width="2" stroke-linecap="round"/>
  </svg>

  <div class="lake-shimmer" aria-hidden="true"></div>

  <!-- ── Page UI ──────────────────────────────────────────── -->
  <div class="page">
    <nav>
      <div class="logo">Ilariya <span>&</span> Isaiah</div>
      <button class="nav-btn" onclick="alert('Parent controls coming soon!')">⚙️ Parents</button>
    </nav>

    <section class="hero">
      <div class="eyebrow">✦ Ilariya & Isaiah's Bible Adventure ✦</div>
      <h1>God's Amazing<br><em>Adventures</em></h1>
      <p class="hero-sub">Explore the greatest stories ever told — with Read-to-Me narration, fun characters, and exciting games!</p>
    </section>

    <div class="cards">

      <!-- Old Testament -->
      <button class="card card-ot" onclick="goTo('old-testament')" aria-label="Explore Old Testament stories">
        <div class="card-art">
          <span class="count-badge">14 Stories</span>
          <div class="card-art-inner">
            <span class="icon-float" style="--d:3.4s; animation-delay:0.2s">🌍</span>
            <span class="icon-float big" style="--d:3s; animation-delay:0s">📜</span>
            <span class="icon-float" style="--d:3.7s; animation-delay:0.4s">🌈</span>
            <span class="icon-float" style="--d:2.8s; animation-delay:0.1s">🦁</span>
          </div>
        </div>
        <div class="card-body">
          <span class="card-tag">Old Testament</span>
          <div class="card-title">Before Jesus Came</div>
          <p class="card-desc">From the very first day of Creation all the way to Jonah's big fish — epic adventures and amazing miracles!</p>
          <div class="chips">
            <span class="chip">🌊 Noah's Ark</span>
            <span class="chip">🗡️ David & Goliath</span>
            <span class="chip">🦁 Daniel's Lions</span>
            <span class="chip">🐳 Jonah</span>
          </div>
          <button class="card-cta" tabindex="-1" aria-hidden="true">
            Start Exploring <span class="cta-arrow">→</span>
          </button>
        </div>
      </button>

      <!-- New Testament -->
      <button class="card card-nt" onclick="goTo('new-testament')" aria-label="Explore New Testament stories">
        <div class="card-art">
          <span class="count-badge">14 Stories</span>
          <div class="card-art-inner">
            <span class="icon-float" style="--d:3.1s; animation-delay:0.3s">⭐</span>
            <span class="icon-float big" style="--d:2.9s; animation-delay:0s">✨</span>
            <span class="icon-float" style="--d:3.5s; animation-delay:0.5s">🕊️</span>
            <span class="icon-float" style="--d:3.2s; animation-delay:0.2s">🐑</span>
          </div>
        </div>
        <div class="card-body">
          <span class="card-tag">New Testament</span>
          <div class="card-title">The Story of Jesus</div>
          <p class="card-desc">From the night Jesus was born under a shining star, all the way to the day He rose again!</p>
          <div class="chips">
            <span class="chip">⭐ Jesus is Born</span>
            <span class="chip">🌊 Calm the Storm</span>
            <span class="chip">🐑 Lost Sheep</span>
            <span class="chip">🌅 He is Alive!</span>
          </div>
          <button class="card-cta" tabindex="-1" aria-hidden="true">
            Start Exploring <span class="cta-arrow">→</span>
          </button>
        </div>
      </button>

    </div>

    <div class="footer">
      <div class="footer-badge">✦ Ilariya & Isaiah's Bible Adventure &nbsp;·&nbsp; Ages 4–10 ✦</div>
      <p class="footer-hint">Tap a path above to begin your adventure</p>
    </div>
  </div>

  <script>
    function goTo(testament) {
      const t = testament === 'old-testament' ? 'OT' : 'NT';
      window.location.href = `Timeline.html?t=${t}`;
    }
  </script>
</body>
</html>
