<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#ff8a3d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Ilariya &amp; Isaiah — Bible Adventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   RESET + BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;
  font-family:'Nunito',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  color:#1a3a5c;background:#0d2236}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
:root{
  --gold:#ff8a3d; --gold-d:#e65100; --gold-l:#ffd180;
  --teal:#0288d1; --teal-d:#01579b; --teal-l:#81d4fa;
  --pink:#ff4081; --purple:#9c27b0;
  --ink:#1a3a5c; --ink-soft:#3a6080;
  --paper:#fff8ec;
  --safe-top:env(safe-area-inset-top,0); --safe-bot:env(safe-area-inset-bottom,0);
  --display: 'Fredoka', 'Nunito', system-ui, sans-serif;
}

/* ============================================================
   ANIMATED SKY BACKGROUND
   ============================================================ */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:linear-gradient(to bottom,
    #4ec8ea 0%,
    #6ad6f0 20%,
    #a8e6f7 42%,
    #ffd089 72%,
    #ff9954 88%,
    #ff7043 100%);
}
.sun{position:absolute;top:6%;right:9%;width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #fff7c2 0%, #ffe566 55%, #ffc930 100%);
  box-shadow:0 0 0 14px rgba(255,229,102,.22),
             0 0 70px 6px rgba(255,200,50,.55);
  animation:sunPulse 4s ease-in-out infinite alternate}
@keyframes sunPulse{
  from{box-shadow:0 0 0 10px rgba(255,229,102,.18),0 0 50px 4px rgba(255,200,50,.4)}
  to  {box-shadow:0 0 0 22px rgba(255,229,102,.30),0 0 90px 10px rgba(255,200,50,.65)}
}
.cloud{position:absolute;background:#fff;border-radius:50px;
  box-shadow:18px 0 0 -4px #fff,-18px 0 0 -4px #fff,
             0 -10px 0 -8px #fff,0 10px 0 -10px #fff;
  opacity:.92}
.cloud.c1{top:14%;left:8%;width:60px;height:18px;animation:drift1 24s linear infinite}
.cloud.c2{top:24%;left:62%;width:80px;height:22px;animation:drift2 32s linear infinite}
.cloud.c3{top:36%;left:30%;width:50px;height:14px;animation:drift1 20s linear infinite reverse}
@keyframes drift1{0%{transform:translateX(-30px)}100%{transform:translateX(40px)}}
@keyframes drift2{0%{transform:translateX(20px)}100%{transform:translateX(-30px)}}

.mountains{position:absolute;bottom:0;left:0;right:0;height:30%;z-index:1;
  background:linear-gradient(to top,#7c4a25 0%,#a06640 50%,transparent 100%);
  clip-path:polygon(0 100%,0 70%,8% 50%,18% 65%,30% 38%,42% 55%,
                    55% 32%,68% 50%,80% 35%,92% 55%,100% 60%,100% 100%);
  opacity:.45}

/* ============================================================
   VIEW SYSTEM
   ============================================================ */
.view{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bot);
  overflow:hidden;animation:viewIn .35s cubic-bezier(.34,1.56,.64,1) both}
.view[hidden]{display:none}
@keyframes viewIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}

/* ============================================================
   TOPBAR (shared)
   ============================================================ */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:14px 16px 6px;width:100%}
.tb-pill{display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-radius:999px;padding:9px 14px;
  font-family:var(--display);font-size:13px;font-weight:700;color:var(--ink);
  box-shadow:0 4px 14px rgba(0,0,0,.18),inset 0 -2px 0 rgba(0,0,0,.06);
  min-height:40px;transition:transform .15s,background .2s}
.tb-pill:hover{background:#fff}
.tb-pill:active{transform:scale(.94)}
.tb-pill svg{width:16px;height:16px;flex-shrink:0}

/* ============================================================
   LOGO
   ============================================================ */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.logo{display:inline-flex;align-items:baseline;gap:6px;
  font-family:var(--display);font-weight:700;
  font-size:clamp(28px,7.5vw,42px);line-height:1;letter-spacing:-.5px;
  color:#fff;text-shadow:0 3px 0 rgba(255,138,61,.55),
                        0 6px 14px rgba(0,0,0,.25)}
.logo .amp{color:#ffe566;font-size:.78em}
.logo-tag{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:#fff;background:rgba(255,138,61,.85);
  padding:4px 12px;border-radius:999px;
  box-shadow:0 2px 8px rgba(0,0,0,.18)}

/* ============================================================
   HUB
   ============================================================ */
#hub{align-items:center}
#hub .topbar{justify-content:flex-end}
.hub-hero{display:flex;flex-direction:column;align-items:center;
  padding:6px 16px 10px;flex-shrink:0}
.hub-prompt{margin-top:14px;font-family:var(--display);font-weight:700;
  font-size:clamp(18px,4.5vw,24px);color:#fff;text-align:center;
  text-shadow:0 2px 10px rgba(0,0,0,.3)}

.hub-cards{flex:1;display:flex;flex-direction:column;
  gap:14px;padding:8px 16px 20px;width:100%;max-width:920px;
  overflow-y:auto;-webkit-overflow-scrolling:touch}

.tcard{position:relative;border-radius:28px;overflow:hidden;
  background:#fff;cursor:pointer;
  box-shadow:0 12px 32px rgba(0,0,0,.22),
             inset 0 -4px 0 rgba(0,0,0,.06);
  transition:transform .25s cubic-bezier(.34,1.8,.64,1);
  display:flex;flex-direction:column;min-height:0;
  border:4px solid #fff}
.tcard:active{transform:scale(.97)}
.tcard-art{position:relative;aspect-ratio:16/8;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.tcard.ot .tcard-art{background:
  radial-gradient(ellipse at 70% 20%,#ffd180 0%,transparent 60%),
  linear-gradient(135deg,#ff7043 0%,#ff9954 50%,#ffb74d 100%)}
.tcard.nt .tcard-art{background:
  radial-gradient(ellipse at 30% 20%,#b3e5fc 0%,transparent 60%),
  linear-gradient(135deg,#0288d1 0%,#29b6f6 50%,#81d4fa 100%)}
.tcard-art::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%,rgba(0,0,0,.18),transparent 50%)}
.tcard-emojis{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:space-around;padding:0 18px;z-index:1;pointer-events:none}
.tcard-emojis span{font-size:clamp(28px,6.5vw,40px);
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.25));
  animation:bobby 3s ease-in-out infinite alternate}
.tcard-emojis span:nth-child(1){animation-delay:0s}
.tcard-emojis span:nth-child(2){animation-delay:.4s}
.tcard-emojis span:nth-child(3){animation-delay:.8s}
.tcard-emojis span:nth-child(4){animation-delay:1.2s}
@keyframes bobby{from{transform:translateY(0) rotate(-4deg)}to{transform:translateY(-10px) rotate(4deg)}}
.tcard-stories{position:absolute;top:12px;right:12px;z-index:2;
  background:#fff;border-radius:999px;padding:5px 12px;
  font-family:var(--display);font-size:11px;font-weight:700;color:var(--ink);
  box-shadow:0 2px 6px rgba(0,0,0,.18)}
.tcard-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:8px}
.tcard-title{font-family:var(--display);font-weight:700;font-size:22px;color:var(--ink)}
.tcard-desc{font-size:14px;font-weight:700;color:var(--ink-soft);line-height:1.5}
.tcard-cta{margin-top:8px;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:999px;padding:14px 22px;font-family:var(--display);font-size:16px;font-weight:700;color:#fff;
  min-height:50px;letter-spacing:.3px}
.tcard.ot .tcard-cta{background:linear-gradient(135deg,#ff7043,#ff9954);
  box-shadow:0 5px 0 #d84315,0 8px 18px rgba(255,112,67,.45)}
.tcard.nt .tcard-cta{background:linear-gradient(135deg,#0288d1,#29b6f6);
  box-shadow:0 5px 0 #01579b,0 8px 18px rgba(2,136,209,.45)}
.tcard-cta:active{transform:translateY(2px);box-shadow:0 3px 0 #d84315,0 4px 10px rgba(0,0,0,.2)}
.tcard.nt .tcard-cta:active{box-shadow:0 3px 0 #01579b,0 4px 10px rgba(0,0,0,.2)}
.tcard-cta svg{width:14px;height:14px}

/* ============================================================
   TIMELINE
   ============================================================ */
.tl-head{flex-shrink:0;padding:6px 16px 12px}
.tl-title{font-family:var(--display);font-weight:700;
  font-size:clamp(22px,5vw,30px);color:#fff;letter-spacing:-.5px;
  text-shadow:0 3px 0 rgba(255,112,67,.45),0 6px 14px rgba(0,0,0,.25)}
.tl-sub{font-family:var(--display);font-size:13px;font-weight:600;color:#fff;
  margin-top:4px;text-shadow:0 1px 6px rgba(0,0,0,.3);opacity:.95}
.tl-bar{margin-top:10px;height:10px;background:rgba(255,255,255,.4);
  border-radius:10px;overflow:hidden;max-width:340px;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.18)}
.tl-bar-fill{height:100%;border-radius:10px;transition:width .5s ease;
  background:linear-gradient(to right,#ffe066,#ff9954)}
.tl-bar-fill.nt{background:linear-gradient(to right,#81d4fa,#0288d1)}

.tl-toggle{display:inline-flex;
  background:#fff;border-radius:999px;padding:5px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,0,0,.18)}
.tl-toggle button{border-radius:999px;padding:8px 18px;
  font-family:var(--display);font-size:13px;font-weight:600;color:var(--ink-soft);
  min-height:38px;transition:all .2s}
.tl-toggle button.on{color:#fff;background:linear-gradient(135deg,#ff7043,#ff9954);
  box-shadow:0 2px 8px rgba(255,112,67,.4)}
.tl-toggle button.on[data-tab="nt"]{background:linear-gradient(135deg,#0288d1,#29b6f6);
  box-shadow:0 2px 8px rgba(2,136,209,.4)}

.tl-scroll{flex:1;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  padding:14px 0 22px;scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.5) transparent}
.tl-scroll::-webkit-scrollbar{height:8px}
.tl-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.5);border-radius:8px}
.tl-track{display:flex;gap:14px;padding:8px 16px;align-items:stretch;
  min-width:max-content}

.tl-card{background:#fff;border-radius:22px;overflow:hidden;
  width:170px;flex-shrink:0;cursor:pointer;
  box-shadow:0 8px 22px rgba(0,0,0,.22),
             inset 0 -3px 0 rgba(0,0,0,.06);
  display:flex;flex-direction:column;
  border:3px solid #fff;
  transition:transform .22s cubic-bezier(.34,1.8,.64,1)}
.tl-card:active{transform:scale(.95)}
.tl-card-art{position:relative;aspect-ratio:1/1;overflow:hidden}
.tl-card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.tl-card-svg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.tl-card-fb{position:absolute;inset:0;z-index:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:700;
  font-size:48px;color:rgba(255,255,255,.9);
  text-shadow:0 3px 8px rgba(0,0,0,.3)}
.tl-card-num{position:absolute;top:8px;left:8px;z-index:2;
  width:28px;height:28px;border-radius:999px;
  background:#fff;color:var(--ink);
  font-family:var(--display);font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tl-card-num.done{background:#43a047;color:#fff}
.tl-card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;flex:1}
.tl-card-title{font-family:var(--display);font-size:14px;font-weight:700;color:var(--ink);line-height:1.2}
.tl-card-verse{font-size:10px;font-weight:700;color:var(--ink-soft)}
.tl-card-tag{margin-top:auto;align-self:flex-start;
  font-family:var(--display);font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;
  background:#fff3e0;color:#bf360c}
.tl-nt .tl-card-tag{background:#e1f5fe;color:#01579b}

.tl-hint{flex-shrink:0;text-align:center;padding:0 16px 14px;
  font-family:var(--display);font-size:12px;font-weight:600;color:#fff;
  letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.3);
  animation:hintWobble 2s ease-in-out infinite alternate}
@keyframes hintWobble{from{transform:translateX(-4px)}to{transform:translateX(4px)}}

/* ============================================================
   STORY VIEW
   ============================================================ */
.sv-top{flex-shrink:0;padding:14px 16px 10px;display:flex;
  align-items:center;justify-content:space-between;gap:8px;
  background:rgba(0,0,0,.18);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.18)}
.sv-counter{font-family:var(--display);font-size:12px;font-weight:600;color:#fff;
  background:rgba(255,255,255,.22);padding:7px 12px;border-radius:999px}
.sv-badge{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;padding:7px 14px;border-radius:999px;color:#fff}
.sv-badge.ot{background:linear-gradient(135deg,#ff7043,#ff9954);box-shadow:0 2px 8px rgba(255,112,67,.4)}
.sv-badge.nt{background:linear-gradient(135deg,#0288d1,#29b6f6);box-shadow:0 2px 8px rgba(2,136,209,.4)}

.sv-hero{flex-shrink:0;position:relative;aspect-ratio:16/9;
  max-height:36vh;overflow:hidden;
  display:flex;align-items:flex-end;padding:16px}
.sv-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.sv-hero svg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.sv-hero-fb{position:absolute;inset:0;z-index:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:700;font-size:22vw;
  color:rgba(255,255,255,.65);text-shadow:0 4px 16px rgba(0,0,0,.3)}
.sv-hero::after{content:'';position:absolute;inset:0;z-index:1;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent 55%)}
.sv-hero-text{position:relative;z-index:2;color:#fff;width:100%}
.sv-hero-title{font-family:var(--display);font-weight:700;
  font-size:clamp(24px,6vw,34px);line-height:1.05;
  text-shadow:0 3px 0 rgba(0,0,0,.25),0 4px 16px rgba(0,0,0,.45)}
.sv-hero-verse{font-family:var(--display);font-size:13px;font-weight:600;opacity:.95;margin-top:4px;
  text-shadow:0 1px 6px rgba(0,0,0,.5)}

.sv-mode{flex-shrink:0;display:inline-flex;
  background:#fff;border-radius:999px;padding:5px;
  margin:14px 16px 4px;align-self:center;
  box-shadow:0 6px 18px rgba(0,0,0,.2),inset 0 -2px 0 rgba(0,0,0,.05)}
.sv-mode button{display:inline-flex;align-items:center;gap:7px;
  border-radius:999px;padding:10px 20px;
  font-family:var(--display);font-size:14px;font-weight:600;
  color:var(--ink-soft);min-height:42px;transition:all .2s}
.sv-mode button.on{background:linear-gradient(135deg,#ff7043,#ff9954);
  color:#fff;box-shadow:0 3px 10px rgba(255,112,67,.4)}
.sv-mode.nt-mode button.on{background:linear-gradient(135deg,#0288d1,#29b6f6);
  box-shadow:0 3px 10px rgba(2,136,209,.4)}
.sv-mode button svg{width:14px;height:14px}

.sv-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 16px 100px;background:rgba(255,250,242,.96);
  backdrop-filter:blur(8px);
  border-top-left-radius:28px;border-top-right-radius:28px;
  margin-top:6px;
  box-shadow:0 -4px 16px rgba(0,0,0,.1)}

/* READ MODE */
.sv-sentence{font-size:clamp(16px,4.4vw,19px);font-weight:700;color:var(--ink);
  line-height:1.6;padding:11px 14px;border-radius:14px;
  margin-bottom:5px;transition:background .25s,transform .2s}
.sv-sentence.active{background:linear-gradient(90deg,#fff3c4,#ffe066);
  transform:translateX(6px) scale(1.01);
  box-shadow:0 3px 12px rgba(255,180,0,.25)}

/* WATCH MODE */
.sv-video{position:relative;aspect-ratio:16/9;width:100%;
  border-radius:18px;overflow:hidden;background:#000;
  box-shadow:0 8px 24px rgba(0,0,0,.25)}
.sv-video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.sv-video-fb{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:#fff;gap:14px;padding:20px;text-align:center;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)}
.sv-video-fb-title{font-family:var(--display);font-weight:700;font-size:22px}
.sv-video-fb-msg{font-size:13px;opacity:.85;line-height:1.5}
.sv-yt-btn{background:#ff0000;color:#fff;border-radius:999px;
  padding:13px 22px;font-family:var(--display);font-weight:700;
  text-decoration:none;display:inline-flex;align-items:center;gap:8px;
  font-size:15px;box-shadow:0 4px 12px rgba(255,0,0,.4)}
.sv-yt-btn:active{transform:scale(.96)}
.sv-watch-actions{margin-top:14px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.sv-watch-actions a{display:inline-flex;align-items:center;gap:6px;
  background:#ff0000;color:#fff;border-radius:999px;
  padding:11px 18px;font-family:var(--display);font-weight:700;font-size:13px;
  text-decoration:none;box-shadow:0 4px 12px rgba(255,0,0,.35);
  min-height:44px}
.sv-watch-actions a:active{transform:scale(.96)}
.sv-watch-actions svg{width:14px;height:14px}
.sv-watch-note{font-size:12px;font-weight:700;color:var(--ink-soft);
  text-align:center;margin-top:10px;line-height:1.5}

/* QUIZ */
.sv-quiz{margin-top:24px;padding:20px;border-radius:20px;
  background:linear-gradient(135deg,#fff9c4 0%,#ffe9a8 100%);
  border:3px solid #ffd180;box-shadow:0 4px 14px rgba(255,160,0,.18)}
.sv-quiz h3{font-family:var(--display);font-weight:700;
  font-size:20px;color:var(--ink);text-align:center;margin-bottom:14px}
.sv-q{background:#fff;border-radius:18px;padding:14px;margin-bottom:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08)}
.sv-q:last-child{margin-bottom:0}
.sv-q-text{font-family:var(--display);font-size:15px;font-weight:600;
  color:var(--ink);margin-bottom:10px;line-height:1.4}
.sv-opts{display:flex;flex-direction:column;gap:8px}
.sv-opt{border:3px solid #ffd180;border-radius:999px;
  padding:11px 18px;font-family:var(--display);font-size:14px;font-weight:600;color:var(--ink);
  background:#fff;text-align:left;width:100%;min-height:46px;
  transition:all .15s}
.sv-opt:active{transform:scale(.97)}
.sv-opt.correct{background:#c8e6c9;border-color:#43a047;color:#2e7d32}
.sv-opt.wrong{background:#ffcdd2;border-color:#e53935;color:#c62828}

/* CONTROL BAR */
.sv-bar{position:absolute;left:0;right:0;bottom:0;z-index:20;
  display:flex;gap:8px;padding:12px 16px;
  padding-bottom:calc(12px + var(--safe-bot));
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
  border-top:1px solid rgba(0,0,0,.08);
  box-shadow:0 -4px 18px rgba(0,0,0,.1)}
.sv-bar button{flex:1;border-radius:999px;padding:13px 18px;
  font-family:var(--display);font-size:15px;font-weight:700;min-height:50px;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  transition:transform .15s}
.sv-bar button:active{transform:scale(.96)}
.sv-bar svg{width:16px;height:16px}
.sv-play{color:#fff}
.sv-play.ot{background:linear-gradient(135deg,#ff7043,#ff9954);
  box-shadow:0 4px 0 #d84315,0 6px 14px rgba(255,112,67,.4)}
.sv-play.nt{background:linear-gradient(135deg,#0288d1,#29b6f6);
  box-shadow:0 4px 0 #01579b,0 6px 14px rgba(2,136,209,.4)}
.sv-play:active{transform:translateY(2px)}
.sv-next{background:#fff8ec;color:var(--ink);border:2px solid #ffd180;
  box-shadow:0 4px 0 #ffd180}
.sv-next:active{transform:translateY(2px);box-shadow:0 2px 0 #ffd180}

/* ============================================================
   TABLET (>=768)
   ============================================================ */
@media (min-width:768px){
  .topbar{padding:18px 26px 10px}
  .hub-cards{flex-direction:row;gap:22px;padding:16px 26px 26px}
  .tcard{flex:1}

/* ============================================================
   Helpers
   ============================================================ */
function ytThumb(id){ return 'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg'; }
function ytWatch(id){ return 'https://www.youtube.com/watch?v='+id; }

/* ============================================================
   STATE & ROUTING
   ============================================================ */
const state = {
  testament: 'ot',
  storyIdx: 0,
  mode: 'read',
  reading: false,
  utter: null,
  audio: null,
  done: (function(){ try{ return JSON.parse(localStorage.getItem('iibible-done')||'{"ot":[],"nt":[]}'); }catch(e){ return {ot:[],nt:[]}; } })()
};

function persistDone(){ try{ localStorage.setItem('iibible-done', JSON.stringify(state.done)); }catch(e){} }
function markDone(t,i){ if(!state.done[t].includes(i)){ state.done[t].push(i); persistDone(); } }

function go(hash){
  if(location.hash === hash) onRoute();
  else location.hash = hash;
}
function showView(id){
  ['hub','timeline','story'].forEach(v=>{
    document.getElementById(v).hidden = (v!==id);
  });
  if(id !== 'story') stopReading();
}
function onRoute(){
  const h = location.hash || '#/hub';
  const parts = h.replace('#/','').split('/');
  if(parts[0] === 'timeline' && (parts[1]==='ot'||parts[1]==='nt')){
    state.testament = parts[1];
    showView('timeline'); renderTimeline();
  } else if(parts[0] === 'story' && (parts[1]==='ot'||parts[1]==='nt')){
    state.testament = parts[1];
    state.storyIdx = Math.max(0, Math.min(13, parseInt(parts[2]||'0',10)));
    state.mode = 'read';
    showView('story'); renderStory();
  } else {
    showView('hub');
  }
}
window.addEventListener('hashchange', onRoute);

/* ============================================================
   HUB
   ============================================================ */
document.querySelectorAll('[data-go]').forEach(b=>{
  b.addEventListener('click', ()=>{
    const t = b.dataset.go;
    if(t==='ot' || t==='nt') go('#/timeline/'+t);
    else if(t==='hub') go('#/hub');
  });
});
document.getElementById('parents-btn').addEventListener('click', ()=>{
  alert("Parent zone coming soon!\n\nThis app uses Minno videos and pairs them with kid-friendly retellings of major Bible stories.\n\nProgress is saved on this device.");
});

/* ============================================================
   TIMELINE
   ============================================================ */
const tlTrack = document.getElementById('tl-track');
const tlTitle = document.getElementById('tl-title');
const tlSub = document.getElementById('tl-sub');
const tlBar = document.getElementById('tl-bar-fill');
const tlProgress = document.getElementById('tl-progress');

document.querySelectorAll('.tl-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.testament = btn.dataset.tab;
    go('#/timeline/'+state.testament);
  });
});

function renderTimeline(){
  const t = state.testament;
  const list = STORIES[t];
  tlTitle.textContent = (t==='ot' ? 'Old Testament' : 'New Testament');
  tlSub.textContent = (t==='ot' ? 'Long ago — God’s big promises begin' : 'When Jesus came to live with us');

  document.querySelectorAll('.tl-toggle button').forEach(b=>{
    b.classList.toggle('on', b.dataset.tab===t);
    b.setAttribute('aria-selected', b.dataset.tab===t ? 'true' : 'false');
  });

  const doneCount = state.done[t].length;
  tlBar.style.width = (doneCount / list.length * 100) + '%';
  tlBar.classList.toggle('nt', t==='nt');
  tlProgress.textContent = doneCount + ' / ' + list.length;

  tlTrack.className = 'tl-track tl-' + t;
  tlTrack.innerHTML = list.map((s,i)=>{
    const done = state.done[t].includes(i);
    const initial = s.title.charAt(0);
    let art;
    if(s.youtube){
      art = '<img class="tl-card-img" src="'+ytThumb(s.youtube)+'" alt="" loading="lazy" '
          + 'onerror="this.style.display=\'none\';this.nextElementSibling&&(this.nextElementSibling.style.display=\'flex\')" />'
          + '<div class="tl-card-fb" style="display:none;background:linear-gradient(135deg,'+(t==='ot'?'#ff7043,#ffb74d':'#0288d1,#81d4fa')+')">'+initial+'</div>';
    } else if(s.svg && SVG[s.svg]){
      art = '<div class="tl-card-svg">'+SVG[s.svg]+'</div>';
    } else {
      art = '<div class="tl-card-fb" style="background:linear-gradient(135deg,'+(t==='ot'?'#ff7043,#ffb74d':'#0288d1,#81d4fa')+')">'+initial+'</div>';
    }
    return '<button class="tl-card" data-idx="'+i+'">'
      + '<div class="tl-card-art">'
      +   art
      +   '<span class="tl-card-num'+(done?' done':'')+'">'+(done?'✓':(i+1))+'</span>'
      + '</div>'
      + '<div class="tl-card-body">'
      +   '<div class="tl-card-title">'+s.title+'</div>'
      +   '<div class="tl-card-verse">'+s.verse+'</div>'
      +   '<span class="tl-card-tag">Age '+s.age+'</span>'
      + '</div>'
      + '</button>';
  }).join('');

  tlTrack.querySelectorAll('.tl-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      const idx = parseInt(card.dataset.idx,10);
      go('#/story/'+t+'/'+idx);
    });
  });

  document.querySelector('.tl-scroll').scrollLeft = 0;
}

const svBack = document.getElementById('sv-back');

const svHero = document.getElementById('sv-hero');

const svHeroFb = document.getElementById('sv-hero-fb');
const svHeroTitle = document.getElementById('sv-hero-title');
const svHeroVerse = document.getElementById('sv-hero-verse');
const svBody = document.getElementById('sv-body');
const svPlay = document.getElementById('sv-play');
const svPlayLabel = document.getElementById('sv-play-label');
const svNext = document.getElementById('sv-next');
const svMode = document.getElementById('sv-mode');

svBack.addEventListener('click', ()=> go('#/timeline/'+state.testament));
svNext.addEventListener('click', ()=>{
  markDone(state.testament, state.storyIdx);
  const next = state.storyIdx + 1;
  if(next < STORIES[state.testament].length) go('#/story/'+state.testament+'/'+next);
  else go('#/timeline/'+state.testament);
});
svPlay.addEventListener('click', toggleReading);

document.querySelectorAll('#sv-mode button').forEach(b=>{
  b.addEventListener('click', ()=>{
    const m = b.dataset.mode;
    state.mode = m;
    document.querySelectorAll('#sv-mode button').forEach(bb=>{
      bb.classList.toggle('on', bb.dataset.mode===m);
      bb.setAttribute('aria-selected', bb.dataset.mode===m ? 'true':'false');
    });
    stopReading();
    renderBody();
  });
});

function renderStory(){
  const t = state.testament;
  const i = state.storyIdx;
  const s = STORIES[t][i];

  svCounter.textContent = (i+1) + ' of ' + STORIES[t].length;
  svBadge.className = 'sv-badge ' + t;
  svBadge.textContent = (t==='ot') ? 'Old Testament' : 'New Testament';

  svPlay.className = 'sv-play ' + t;
  svPlayLabel.textContent = 'Read to me';

  svMode.className = 'sv-mode' + (t==='nt' ? ' nt-mode' : '');

  svHero.style.background = (t==='ot')
    ? 'linear-gradient(135deg,#ff7043,#ff9954,#ffb74d)'
    : 'linear-gradient(135deg,#0288d1,#29b6f6,#81d4fa)';

  // hero image / SVG / fallback
  svHeroImg.hidden = true; svHeroImg.src = '';
  svHeroSvg.hidden = true; svHeroSvg.innerHTML = '';
  svHeroFb.style.display = 'none';
  svHeroFb.textContent = s.title.charAt(0);

  if(s.youtube){
    svHeroImg.onload = ()=>{ svHeroImg.hidden = false; svHeroFb.style.display='none'; };
    svHeroImg.onerror = ()=>{ svHeroImg.hidden = true; svHeroFb.style.display='flex'; };
    svHeroImg.src = ytThumb(s.youtube);
  } else if(s.svg && SVG[s.svg]){
    svHeroSvg.innerHTML = SVG[s.svg];
    svHeroSvg.hidden = false;
  } else {
    svHeroFb.style.display = 'flex';
  }

  svHeroTitle.textContent = s.title;
  svHeroVerse.textContent = s.verse;

  state.mode = 'read';
  document.querySelectorAll('#sv-mode button').forEach(bb=>{
    bb.classList.toggle('on', bb.dataset.mode==='read');
    bb.setAttribute('aria-selected', bb.dataset.mode==='read' ? 'true':'false');
  });

  renderBody();
  svBody.scrollTop = 0;
}

  const s = STORIES[t][state.storyIdx];

  if(state.mode === 'watch'){
    svPlay.style.display = 'none';
    if(s.youtube){
      // Use standard youtube.com/embed (more permissive than nocookie),
      // and ALWAYS show "Open in YouTube" buttons below as a guaranteed fallback
      // for videos where embedding has been disabled (Error 153).
      svBody.innerHTML =
        '<div class="sv-video">'
        + '<iframe src="https://www.youtube.com/embed/'+s.youtube+'?rel=0&modestbranding=1&playsinline=1" '
        + 'title="'+s.title+'" '
        + 'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" '
        + 'referrerpolicy="strict-origin-when-cross-origin" '
        + 'allowfullscreen loading="lazy"></iframe>'
        + '</div>'
        + '<div class="sv-watch-actions">'
        +   '<a href="'+ytWatch(s.youtube)+'" target="_blank" rel="noopener">'
        +     '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>'
        +     ' Open on YouTube'
        +   '</a>'
        + '</div>'
        + '<p class="sv-watch-note">Video by <a href="'+MINNO_CHANNEL+'" target="_blank" rel="noopener" style="color:#0288d1">Minno Kids</a>. If the video shows an error, tap <b>Open on YouTube</b>.</p>';
    } else {
      const search = encodeURIComponent(s.title + ' Minno');
      svBody.innerHTML =
        '<div class="sv-video">'
        + '<div class="sv-video-fb">'
        +   '<div class="sv-video-fb-title">'+s.title+'</div>'
        +   '<div class="sv-video-fb-msg">No Minno video matched yet for this one — search the channel:</div>'
        +   '<a class="sv-yt-btn" href="https://www.youtube.com/@MinnoKids/search?query='+search+'" target="_blank" rel="noopener">'
        +     '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>'
        +     ' Find on Minno'
        +   '</a>'
        + '</div>'
        + '</div>'
        + '<p class="sv-watch-note">Tip: Tap <b>Read</b> to hear the story instead.</p>';
    }
  } else {
    svPlay.style.display = '';
    const sentences = s.sentences.map(function(line,i){
      return '<p class="sv-sentence" data-i="'+i+'">'+line+'</p>';
    }).join('');
    const quiz = (s.quiz||[]).map(function(q,qi){
      const opts = q.opts.map(function(o,oi){
        return '<button class="sv-opt" data-correct="'+(oi===q.a?1:0)+'">'+o+'</button>';
      }).join('');
      return '<div class="sv-q">'
        + '<div class="sv-q-text">'+(qi+1)+'. '+q.q+'</div>'
        + '<div class="sv-opts">'+opts+'</div>'
        + '</div>';
    }).join('');
    svBody.innerHTML = sentences + (quiz ?
      '<div class="sv-quiz"><h3>Quick check 🤔</h3>'+quiz+'</div>' : '');

    svBody.querySelectorAll('.sv-opt').forEach(function(opt){
      opt.addEventListener('click', function(){
        const parent = opt.closest('.sv-opts');
        if(parent.dataset.locked) return;
        parent.dataset.locked = '1';
        if(opt.dataset.correct === '1'){ opt.classList.add('correct'); }
        else {
          opt.classList.add('wrong');
          parent.querySelectorAll('.sv-opt').forEach(function(o){
            if(o.dataset.correct === '1') o.classList.add('correct');
          });
        }
      });
    });
  }
}

/* ============================================================
   READ-TO-ME
   ============================================================ */
let cachedVoices = [];
function loadVoices(){ cachedVoices = (window.speechSynthesis ? speechSynthesis.getVoices() : []) || []; }
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function pickVoice(){
  if(!cachedVoices.length) loadVoices();
  const v = cachedVoices;
  const en = v.filter(function(x){ return /^en[-_]/i.test(x.lang); });
  const score = function(x){
    const n = x.name.toLowerCase();
    let s = 0;
    if(/samantha|karen|moira|tessa|serena|allison|ava/.test(n)) s += 100;
    if(/google/.test(n)) s += 80;
    if(/natural|online|neural/.test(n)) s += 70;
    if(/female/.test(n)) s += 30;
    if(/en-us|en_us/i.test(x.lang)) s += 20;
    if(/en-gb|en_gb/i.test(x.lang)) s += 15;
    if(/en-au|en_au/i.test(x.lang)) s += 10;
    if(x.default) s += 10;
    if(/zira|hazel|fred|albert|bahh|whisper|cellos|trinoids|zarvox/.test(n)) s -= 80;
    return s;
  };
  en.sort(function(a,b){ return score(b) - score(a); });
  return en[0] || v[0];
}

function stopReading(){
  state.reading = false;
  if(window.speechSynthesis) speechSynthesis.cancel();
  if(state.audio){ state.audio.pause(); state.audio = null; }
  state.utter = null;
  svPlayLabel.textContent = 'Read to me';
  svBody.querySelectorAll('.sv-sentence.active').forEach(function(el){ el.classList.remove('active'); });
}

function highlightSentence(i){
  svBody.querySelectorAll('.sv-sentence.active').forEach(function(el){ el.classList.remove('active'); });
  const el = svBody.querySelector('.sv-sentence[data-i="'+i+'"]');
  if(el){
    el.classList.add('active');
    el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

async function toggleReading(){
  if(state.reading){ stopReading(); return; }
  if(state.mode !== 'read') return;
  const t = state.testament;
  const s = STORIES[t][state.storyIdx];

  const mp3 = 'audio/' + t + '_' + s.id + '.mp3';
  let ok = false;
  try{ ok = await fetch(mp3, {method:'HEAD'}).then(function(r){ return r.ok; }); }catch(e){}
  if(ok){ playMp3(mp3, s.sentences.length); return; }

  if(!window.speechSynthesis){
    alert("Sorry — your browser can’t read aloud. Try the Watch tab instead.");
    return;
  }
  speakSentences(s.sentences, 0);
}

function playMp3(src, sentenceCount){
  state.audio = new Audio(src);
  state.audio.preload = 'auto';
  state.reading = true;
  svPlayLabel.textContent = 'Stop';
  state.audio.addEventListener('loadedmetadata', function(){
    const total = state.audio.duration;
    const step = total / sentenceCount;
    state.audio.ontimeupdate = function(){
      const i = Math.min(sentenceCount-1, Math.floor(state.audio.currentTime / step));
      highlightSentence(i);
    };
  });
  state.audio.onended = function(){ stopReading(); };
  state.audio.play().catch(function(){ stopReading(); alert("Couldn’t play audio."); });
}

function speakSentences(arr, i){
  if(i >= arr.length){ stopReading(); return; }
  state.reading = true;
  svPlayLabel.textContent = 'Stop';
  const u = new SpeechSynthesisUtterance(arr[i]);
  const v = pickVoice();
  if(v) u.voice = v;
  u.rate = 0.95;
  u.pitch = 1.0;
  u.volume = 1.0;
  u.onstart = function(){ highlightSentence(i); };
  u.onend = function(){ if(!state.reading) return; speakSentences(arr, i+1); };
  u.onerror = function(){ stopReading(); };
  state.utter = u;
  speechSynthesis.speak(u);
}

/* ============================================================
   INIT
   ============================================================ */
window.addEventListener('beforeunload', stopReading);
document.addEventListener('visibilitychange', function(){ if(document.hidden) stopReading(); });

onRoute();
</script>
