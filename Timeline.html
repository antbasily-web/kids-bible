<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ilariya & Isaiah's Bible Adventure – Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', system-ui, sans-serif; }

    /* ─── SCENE ──────────────────────────────── */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(to bottom,
        #4ec9f0 0%, #87ddf5 35%, #c4f0fb 55%,
        #a8e6f0 70%, #5bc8ea 80%, #ffd89b 92%, #f5c06a 100%);
    }
    .sun {
      position: fixed; z-index: 1; top: 30px; right: 8%;
      width: 72px; height: 72px; border-radius: 50%; background: #ffe566;
      box-shadow: 0 0 0 14px rgba(255,229,102,.22), 0 0 0 28px rgba(255,229,102,.10), 0 0 56px rgba(255,200,50,.4);
      animation: sunP 4s ease-in-out infinite alternate;
    }
    @keyframes sunP { from { box-shadow: 0 0 0 10px rgba(255,229,102,.2), 0 0 40px rgba(255,200,50,.3); }
                      to   { box-shadow: 0 0 0 20px rgba(255,229,102,.28), 0 0 72px rgba(255,200,50,.5); } }
    .cloud { position: fixed; z-index: 1; pointer-events: none; animation: drift linear infinite alternate; }
    @keyframes drift { from { transform: translateX(-12px); } to { transform: translateX(12px); } }
    .cloud-body { background: white; border-radius: 50px; position: relative; }
    .cloud-body::before, .cloud-body::after { content: ''; position: absolute; background: white; border-radius: 50%; }
    .mountains { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 2; pointer-events: none; }

    /* ─── LAYOUT ─────────────────────────────── */
    .page {
      position: relative; z-index: 10;
      height: 100vh; display: flex; flex-direction: column;
      padding: 0 0 0;
    }

    /* ─── NAV ────────────────────────────────── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 0; flex-shrink: 0; gap: 12px;
    }
    .back-btn {
      background: rgba(255,255,255,.82); backdrop-filter: blur(10px);
      border: none; border-radius: 50px; padding: 9px 18px;
      font-size: 13px; font-weight: 800; color: #1a3a5c;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,.10);
      transition: transform .15s, background .2s; white-space: nowrap;
    }
    .back-btn:hover { background: white; transform: scale(1.04); }
    .testament-toggle {
      display: flex; gap: 6px; background: rgba(255,255,255,.6);
      backdrop-filter: blur(10px); border-radius: 50px; padding: 5px;
      box-shadow: 0 2px 12px rgba(0,0,0,.10);
    }
    .toggle-btn {
      border: none; border-radius: 50px; padding: 8px 18px;
      font-size: 12px; font-weight: 800; font-family: inherit;
      cursor: pointer; transition: all .22s; color: #4a6a80; background: transparent;
    }
    .toggle-btn.active { background: white; color: #1a3a5c; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .progress-pill {
      background: rgba(255,255,255,.82); backdrop-filter: blur(10px);
      border-radius: 50px; padding: 9px 16px;
      font-size: 12px; font-weight: 800; color: #1a6fa8;
      box-shadow: 0 2px 12px rgba(0,0,0,.10); white-space: nowrap;
    }

    /* ─── HEADER ─────────────────────────────── */
    .tl-header {
      padding: 14px 28px 10px; flex-shrink: 0;
    }
    .tl-title { font-size: clamp(22px, 4vw, 30px); font-weight: 900; color: #1a3a5c; letter-spacing: -.5px; }
    .tl-sub { font-size: 13px; font-weight: 700; color: #2a5a7c; margin-top: 2px; }
    .progress-bar-wrap {
      margin-top: 10px; height: 8px; background: rgba(255,255,255,.5);
      border-radius: 10px; overflow: hidden; max-width: 280px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.1);
    }
    .progress-bar-fill {
      height: 100%; border-radius: 10px; transition: width .5s ease;
      background: linear-gradient(to right, #ff9a3c, #ff7043);
    }
    .progress-bar-fill.nt { background: linear-gradient(to right, #29b6f6, #0288d1); }

    /* ─── TIMELINE SCROLL ────────────────────── */
    .tl-scroll-wrap {
      flex: 1; overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 10px 0 20px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.5) transparent;
    }
    .tl-scroll-wrap::-webkit-scrollbar { height: 5px; }
    .tl-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
    .tl-scroll-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.5); border-radius: 10px; }

    .tl-track {
      display: flex; align-items: flex-end;
      padding: 8px 32px 0;
      min-width: max-content; position: relative;
      gap: 0;
    }

    /* The path line */
    .tl-path {
      position: absolute; bottom: 34px; left: 32px; right: 32px;
      height: 8px; border-radius: 8px; z-index: 0;
      background: linear-gradient(to right, #ff9a3c, #ff7043, #ffd54f, #ff9a3c, #ff7043);
      background-size: 400% 100%;
      animation: pathFlow 4s linear infinite;
      box-shadow: 0 3px 14px rgba(255,120,50,.4);
    }
    .tl-path.nt {
      background: linear-gradient(to right, #29b6f6, #0288d1, #7c4dff, #29b6f6, #0288d1);
      background-size: 400% 100%;
      box-shadow: 0 3px 14px rgba(2,136,209,.4);
    }
    @keyframes pathFlow { from { background-position: 0% 0%; } to { background-position: 100% 0%; } }

    /* Story stop */
    .stop {
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 1; cursor: pointer;
      width: 162px; flex-shrink: 0;
      animation: stopIn .45s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes stopIn { from { opacity: 0; transform: translateY(20px) scale(.9); } to { opacity: 1; transform: none; } }

    /* Guide character stops */
    .guide-stop {
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 2; width: 90px; flex-shrink: 0;
      animation: stopIn .45s cubic-bezier(.34,1.56,.64,1) both;
    }
    .guide-bubble {
      background: white; border-radius: 14px; padding: 6px 10px;
      font-size: 10px; font-weight: 800; color: #1a3a5c;
      text-align: center; line-height: 1.3; max-width: 80px;
      box-shadow: 0 3px 12px rgba(0,0,0,.12);
      margin-bottom: 6px; position: relative;
    }
    .guide-bubble::after {
      content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      border: 7px solid transparent; border-top-color: white;
      border-bottom: none;
    }
    .guide-char { font-size: 42px; line-height: 1; animation: charBob 2s ease-in-out infinite alternate; }
    @keyframes charBob { from { transform: translateY(0); } to { transform: translateY(-6px); } }
    .guide-stem { width: 3px; height: 14px; background: rgba(255,255,255,.6); border-radius: 2px; }
    .guide-node {
      width: 20px; height: 20px; border-radius: 50%;
      background: white; border: 3px solid rgba(255,255,255,.6);
      margin-bottom: 0;
    }

    /* Story card */
    .card {
      background: white; border-radius: 20px; overflow: hidden;
      width: 150px; box-shadow: 0 6px 22px rgba(26,58,92,.18), 0 2px 6px rgba(0,0,0,.08);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
      border: none; text-align: left; padding: 0; font-family: inherit;
    }
    .stop:hover .card { transform: translateY(-8px); box-shadow: 0 16px 40px rgba(26,58,92,.25); }
    .stop:active .card { transform: scale(.97); }
    .card.done { opacity: .75; }
    .card.done .card-art::after {
      content: '✓'; position: absolute; top: 8px; left: 8px;
      width: 24px; height: 24px; border-radius: 50%; background: #4caf50;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    /* Card art */
    .card-art {
      height: 90px; position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-art .card-num {
      position: absolute; top: 8px; right: 8px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.35); backdrop-filter: blur(4px);
      border: 1.5px solid rgba(255,255,255,.6);
      font-size: 10px; font-weight: 900; color: white;
      display: flex; align-items: center; justify-content: center;
    }
    .card-icon {
      font-size: 44px; line-height: 1;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,.2));
      animation: iconBob var(--d,3s) ease-in-out infinite alternate;
    }
    @keyframes iconBob { from { transform: translateY(0); } to { transform: translateY(-7px); } }

    /* Card body */
    .card-body { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 5px; }
    .card-title { font-size: 13px; font-weight: 900; color: #1a3a5c; line-height: 1.2; }
    .card-verse { font-size: 10px; font-weight: 700; color: #7a9ab5; }
    .card-meta { display: flex; align-items: center; gap: 5px; }
    .age-tag {
      font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 20px;
      background: #f0f8ff; color: #015f99; border: 1px solid #b0d8f5;
    }
    .card-ot .age-tag { background: #fff5ee; color: #bf5000; border-color: #ffd0a0; }
    .read-btn {
      margin-top: 4px; width: 100%; padding: 8px 0;
      border-radius: 30px; border: none; font-size: 11px; font-weight: 900;
      font-family: inherit; cursor: pointer; color: white;
      transition: transform .15s, box-shadow .15s;
    }
    .card-ot .read-btn { background: linear-gradient(135deg, #ff7043, #ff9a3c); box-shadow: 0 3px 10px rgba(255,112,67,.35); }
    .card-nt .read-btn { background: linear-gradient(135deg, #0288d1, #29b6f6); box-shadow: 0 3px 10px rgba(2,136,209,.35); }
    .read-btn:hover { transform: scale(1.05); }

    /* Connector stem + node */
    .stem { width: 3px; height: 18px; border-radius: 2px; }
    .card-ot + .stem { background: linear-gradient(to bottom, #ff9a3c, #ff7043); }
    .card-nt + .stem { background: linear-gradient(to bottom, #29b6f6, #0288d1); }
    .node {
      width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid white; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: white;
      box-shadow: 0 3px 10px rgba(0,0,0,.2);
      transition: transform .2s; flex-shrink: 0;
    }
    .stop:hover .node { transform: scale(1.15); }
    .node.done { background: #4caf50 !important; border-color: white; }
    .card-ot ~ .node { background: #ff7043; }
    .card-nt ~ .node { background: #0288d1; }

    /* Swipe hint */
    .swipe-hint {
      padding: 0 24px 16px; text-align: center;
      font-size: 12px; font-weight: 800; color: rgba(26,58,92,.5);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      flex-shrink: 0; animation: hintBob 2s ease-in-out infinite alternate;
    }
    @keyframes hintBob { from { transform: translateX(0); } to { transform: translateX(6px); } }
    .hint-arrow { font-size: 16px; }

    /* ─── COMPLETION MODAL ───────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(10,30,60,.5); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 28px; padding: 36px 32px;
      max-width: 340px; width: 90%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      animation: modalIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-icon { font-size: 56px; margin-bottom: 12px; }
    .modal-title { font-size: 22px; font-weight: 900; color: #1a3a5c; }
    .modal-text { font-size: 14px; font-weight: 600; color: #4a6a80; margin-top: 8px; line-height: 1.5; }
    .modal-close {
      margin-top: 20px; padding: 12px 28px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, #ff7043, #ff9a3c); color: white;
      font-size: 14px; font-weight: 900; font-family: inherit; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Scene -->
  <div class="scene" aria-hidden="true"></div>
  <div class="sun" aria-hidden="true"></div>

  <!-- Clouds -->
  <div class="cloud" style="top:40px;left:5%;animation-duration:9s;" aria-hidden="true">
    <div class="cloud-body" style="width:90px;height:28px;">
      <div style="position:absolute;width:40px;height:40px;background:white;border-radius:50%;top:-20px;left:12px;"></div>
      <div style="position:absolute;width:30px;height:30px;background:white;border-radius:50%;top:-15px;left:44px;"></div>
    </div>
  </div>
  <div class="cloud" style="top:28px;left:40%;animation-duration:12s;animation-delay:2s;transform:scale(.65);" aria-hidden="true">
    <div class="cloud-body" style="width:90px;height:28px;">
      <div style="position:absolute;width:40px;height:40px;background:white;border-radius:50%;top:-20px;left:12px;"></div>
      <div style="position:absolute;width:30px;height:30px;background:white;border-radius:50%;top:-15px;left:44px;"></div>
    </div>
  </div>
  <div class="cloud" style="top:55px;right:12%;animation-duration:10s;animation-delay:1s;transform:scale(.78);" aria-hidden="true">
    <div class="cloud-body" style="width:90px;height:28px;">
      <div style="position:absolute;width:40px;height:40px;background:white;border-radius:50%;top:-20px;left:12px;"></div>
      <div style="position:absolute;width:30px;height:30px;background:white;border-radius:50%;top:-15px;left:44px;"></div>
    </div>
  </div>

  <!-- Mountains + Characters -->
  <svg class="mountains" viewBox="0 0 1440 300" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <!-- Far mountains -->
    <path d="M0,200 C80,162 170,188 260,158 C350,128 430,172 530,142 C630,112 720,158 840,128 C960,98 1050,146 1170,116 C1290,86 1380,132 1440,118 L1440,300 L0,300 Z" fill="#c9b8e8"/>
    <path d="M262,158 L278,122 L294,158Z M534,142 L552,105 L570,142Z M842,128 L863,90 L884,128Z M1172,116 L1192,78 L1212,116Z" fill="white" opacity=".85"/>
    <!-- Mid mountains -->
    <path d="M0,225 L55,182 L120,215 L195,165 L275,202 L365,155 L455,192 L555,145 L665,182 L780,137 L900,175 L1020,135 L1140,172 L1260,137 L1440,165 L1440,300 L0,300 Z" fill="#6dbf6d"/>
    <polygon points="80,211 93,183 106,211" fill="#3d8a3d"/>
    <polygon points="410,179 422,155 434,179" fill="#3d8a3d"/>
    <polygon points="730,169 742,145 754,169" fill="#3d8a3d"/>

    <!-- Near hills -->
    <path d="M0,255 Q180,233 360,249 Q540,233 720,251 Q900,233 1080,249 Q1260,233 1440,247 L1440,300 L0,300 Z" fill="#4a9e4a"/>
    <!-- Lake -->
    <path d="M0,262 Q240,252 480,258 Q720,250 960,258 Q1200,250 1440,258 L1440,300 L0,300 Z" fill="#5bc8ea" opacity=".85"/>
    <line x1="80"  y1="270" x2="230" y2="270" stroke="white" stroke-width="1.5" opacity=".5"/>
    <line x1="400" y1="274" x2="580" y2="274" stroke="white" stroke-width="1"   opacity=".4"/>
    <line x1="720" y1="268" x2="900" y2="268" stroke="white" stroke-width="1.5" opacity=".5"/>
    <line x1="1080" y1="272" x2="1260" y2="272" stroke="white" stroke-width="1" opacity=".4"/>
    <!-- Beach -->
    <path d="M0,278 Q360,270 720,274 Q1080,270 1440,278 L1440,300 L0,300 Z" fill="#ffd89b"/>
    <!-- Birds -->
    <path d="M340,72 Q346,67 352,72 Q358,67 364,72" fill="none" stroke="#2a5a7c" stroke-width="2" stroke-linecap="round"/>
    <path d="M780,55 Q786,50 792,55 Q798,50 804,55"  fill="none" stroke="#2a5a7c" stroke-width="2" stroke-linecap="round"/>
    <path d="M1080,65 Q1086,60 1092,65 Q1098,60 1104,65" fill="none" stroke="#2a5a7c" stroke-width="2" stroke-linecap="round"/>

    <!-- ── CHARACTER: Shepherd Boy (right side) ── -->
    <g transform="translate(1280,230)">
      <!-- robe -->
      <path d="M-13,10 L-16,55 L16,55 L13,10 Q0,18 -13,10Z" fill="#e8a050"/>
      <!-- body -->
      <rect x="-12" y="-2" width="24" height="16" rx="5" fill="#e8a050"/>
      <!-- head -->
      <circle cx="0" cy="-18" r="16" fill="#f4c08a"/>
      <!-- hair -->
      <path d="M-16,-26 Q-18,-10 -15,0" stroke="#7b3f00" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M16,-26 Q18,-10 15,0"  stroke="#7b3f00" stroke-width="5" fill="none" stroke-linecap="round"/>
      <ellipse cx="0" cy="-30" rx="16" ry="7" fill="#7b3f00"/>
      <!-- eyes -->
      <circle cx="-5.5" cy="-20" r="3" fill="#333"/>
      <circle cx="5.5"  cy="-20" r="3" fill="#333"/>
      <circle cx="-4.5" cy="-21" r="1" fill="white"/>
      <circle cx="6.5"  cy="-21" r="1" fill="white"/>
      <!-- smile -->
      <path d="M-5,-11 Q0,-7 5,-11" fill="none" stroke="#c07040" stroke-width="2" stroke-linecap="round"/>
      <!-- cheeks -->
      <circle cx="-9" cy="-13" r="4" fill="#ffb0a0" opacity=".5"/>
      <circle cx="9"  cy="-13" r="4" fill="#ffb0a0" opacity=".5"/>
      <!-- staff -->
      <line x1="18" y1="-10" x2="22" y2="58" stroke="#7b3f00" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M15,-14 Q22,-22 25,-10" fill="none" stroke="#7b3f00" stroke-width="3" stroke-linecap="round"/>
      <!-- legs -->
      <rect x="-9" y="52" width="7" height="18" rx="3.5" fill="#c87830"/>
      <rect x="2"  y="52" width="7" height="18" rx="3.5" fill="#c87830"/>
      <!-- sandals -->
      <ellipse cx="-5.5" cy="71" rx="7" ry="3.5" fill="#7b3f00"/>
      <ellipse cx="5.5"  cy="71" rx="7" ry="3.5" fill="#7b3f00"/>
    </g>

    <!-- ── CHARACTER: Girl (left side) ── -->
    <g transform="translate(160,240)">
      <!-- dress -->
      <path d="M-14,12 L-20,56 L20,56 L14,12 Q0,20 -14,12Z" fill="#ff80b0"/>
      <!-- body -->
      <rect x="-12" y="-2" width="24" height="18" rx="5" fill="#ff80b0"/>
      <!-- head -->
      <circle cx="0" cy="-18" r="16" fill="#f4c08a"/>
      <!-- pigtails -->
      <path d="M-16,-26 Q-22,-18 -20,-8" stroke="#7b3f00" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M16,-26 Q22,-18 20,-8"  stroke="#7b3f00" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="-20" cy="-8" r="5" fill="#ff4499"/>
      <circle cx="20"  cy="-8" r="5" fill="#ff4499"/>
      <ellipse cx="0" cy="-30" rx="16" ry="7" fill="#7b3f00"/>
      <!-- eyes -->
      <circle cx="-5.5" cy="-20" r="3" fill="#333"/>
      <circle cx="5.5"  cy="-20" r="3" fill="#333"/>
      <circle cx="-4.5" cy="-21" r="1" fill="white"/>

      <rect x="2"  y="53" width="7" height="16" rx="3.5" fill="#f4c08a"/>

    <!-- ── CHARACTER: Sheep (center) ── -->
    <g transform="translate(720,268)">
      <ellipse cx="0" cy="8" rx="26" ry="18" fill="white"/>
      <circle cx="22" cy="0" r="14" fill="white"/>
      <ellipse cx="34" cy="2" rx="10" ry="9" fill="#e8c89a"/>

      <rect x="6"   y="22" width="5" height="14" rx="2.5" fill="#e8c89a"/>
      <rect x="17"  y="22" width="5" height="14" rx="2.5" fill="#e8c89a"/>
      <!-- ear -->
      <ellipse cx="29" cy="-9" rx="5" ry="3" fill="#e8c89a" transform="rotate(-30 29 -9)"/>
    </g>
  </svg>

  <!-- ── PAGE ───────────────────────────────── -->
  <div class="page">
    <nav>
      <button class="back-btn" onclick="window.location.href='NavigationHub.html'">← Home</button>
      <div class="testament-toggle">
        <button class="toggle-btn active" id="btn-ot" onclick="switchTestament('OT')">📜 Old Testament</button>
        <button class="toggle-btn"        id="btn-nt" onclick="switchTestament('NT')">✨ New Testament</button>
      </div>
      <div class="progress-pill" id="progress-pill">0 / 14</div>
    </nav>

    <div class="tl-header">
      <div class="tl-title" id="tl-title">Old Testament Journey</div>
      <div class="tl-sub"  id="tl-sub">14 epic adventures — tap a story to begin!</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="tl-scroll-wrap" id="tl-scroll">
      <div class="tl-track" id="tl-track">
        <div class="tl-path" id="tl-path"></div>
        <!-- stops injected by JS -->
      </div>
    </div>

    <div class="swipe-hint">
      <span>Swipe to explore all stories</span>
      <span class="hint-arrow">👉</span>
    </div>
  </div>

  <!-- Completion Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-icon" id="modal-icon">🌟</div>
      <div class="modal-title" id="modal-title">Amazing!</div>
      <p class="modal-text" id="modal-text">Great job reading that story!</p>
      <button class="modal-close" onclick="closeModal()">Keep Exploring! →</button>
    </div>
  </div>

  <script>
    /* ── Story Data ─────────────────────────────── */
    const STORIES = {
      OT: [
        { icon:'🌍', title:'The Creation',      verse:'Genesis 1–2',   age:'4+', color:['#4ec9f0','#0288d1'], fun:'God made EVERYTHING in just 6 days!' },
        { icon:'🌈', title:"Noah's Ark",         verse:'Genesis 6–9',   age:'4+', color:['#ff9a3c','#ff7043'], fun:'Noah fit 2 of every animal on one big boat!' },
        { icon:'⭐', title:"Abraham's Journey",  verse:'Genesis 12–22', age:'5+', color:['#ffd54f','#ff9a3c'], fun:'Abraham trusted God on a giant adventure!' },
        { icon:'🎨', title:"Joseph's Coat",      verse:'Genesis 37–50', age:'5+', color:['#ab47bc','#7b1fa2'], fun:"Joseph's colourful coat changed everything!" },
        { icon:'🔥', title:'Moses & The Exodus', verse:'Exodus 1–15',   age:'5+', color:['#ff5722','#e64a19'], fun:'God parted the whole Red Sea — whoosh!' },
        { icon:'📜', title:'Ten Commandments',   verse:'Exodus 20',     age:'6+', color:['#78909c','#546e7a'], fun:"God wrote 10 rules with His own finger!" },
        { icon:'🎺', title:"Joshua's Army",      verse:'Joshua 1–6',   age:'5+', color:['#66bb6a','#388e3c'], fun:'They marched and the walls fell down!' },
        { icon:'💪', title:'Samson the Strong',  verse:'Judges 13–16',  age:'6+', color:['#ffa726','#f57c00'], fun:'Samson was the strongest man ever!' },
        { icon:'🌾', title:"Ruth's Kindness",    verse:'Ruth 1–4',     age:'5+', color:['#ffcc02','#ff9800'], fun:'Ruth showed love by never giving up!' },
        { icon:'🗡️', title:'David & Goliath',   verse:'1 Samuel 17',  age:'4+', color:['#ef5350','#c62828'], fun:'A little stone defeated a GIANT!' },
        { icon:'👑', title:'King Solomon',       verse:'1 Kings 3–10',  age:'6+', color:['#ffd54f','#f9a825'], fun:'Solomon asked for wisdom, not gold!' },
        { icon:'⚡', title:"Elijah's Fire",      verse:'1 Kings 18',   age:'6+', color:['#ff6f00','#e65100'], fun:'Fire came down from the sky — BOOM!' },
        { icon:'🦁', title:"Daniel's Lions",     verse:'Daniel 6',     age:'4+', color:['#e53935','#b71c1c'], fun:'The lions had no power over Daniel!' },
        { icon:'🐳', title:'Jonah & the Fish',   verse:'Jonah 1–4',   age:'4+', color:['#26c6da','#00838f'], fun:'Jonah lived inside a giant fish for 3 days!' },
      ],
      NT: [
        { icon:'⭐', title:'Jesus is Born',       verse:'Luke 2',      age:'4+', color:['#ffd54f','#ff9a3c'], fun:'Angels sang and shepherds ran to see baby Jesus!' },
        { icon:'🌟', title:'The Wise Men',        verse:'Matthew 2',   age:'4+', color:['#9575cd','#512da8'], fun:'They followed a star across the whole desert!' },
        { icon:'🕊️', title:'Jesus is Baptized',  verse:'Matthew 3',   age:'5+', color:['#29b6f6','#0288d1'], fun:"God spoke from heaven: 'This is My Son!'" },
        { icon:'🚢', title:'Follow Me!',          verse:'Luke 5',      age:'5+', color:['#26a69a','#00796b'], fun:'Fishermen left their boats to follow Jesus!' },
        { icon:'📖', title:'Sermon on the Mount', verse:'Matthew 5–7', age:'6+', color:['#66bb6a','#2e7d32'], fun:'Jesus taught the greatest lesson ever!' },
        { icon:'🌊', title:'Calming the Storm',   verse:'Mark 4',      age:'4+', color:['#5c6bc0','#283593'], fun:'Jesus told the storm to STOP — and it did!' },
        { icon:'🍞', title:'Feeding 5,000',       verse:'John 6',      age:'4+', color:['#ffa726','#e65100'], fun:'5 loaves + 2 fish fed 5,000 people!' },
        { icon:'🐑', title:'The Lost Sheep',      verse:'Luke 15',     age:'4+', color:['#66bb6a','#388e3c'], fun:'The shepherd left 99 sheep to find just one!' },
        { icon:'🏠', title:'The Lost Son',        verse:'Luke 15',     age:'5+', color:['#ff7043','#bf360c'], fun:'Dad ran to hug his son from far away!' },
        { icon:'✨', title:'Lazarus Lives!',       verse:'John 11',     age:'5+', color:['#9575cd','#4527a0'], fun:'Jesus brought his friend back to life!' },
        { icon:'🌿', title:'Palm Sunday',         verse:'John 12',     age:'5+', color:['#66bb6a','#1b5e20'], fun:'Everyone waved palms shouting Hosanna!' },
        { icon:'🍷', title:'The Last Supper',     verse:'Luke 22',     age:'6+', color:['#ef5350','#b71c1c'], fun:'Jesus shared a very special meal with his friends.' },
        { icon:'🌅', title:'He is Alive!',        verse:'John 20',     age:'4+', color:['#ffd54f','#ff8f00'], fun:'The tomb was EMPTY — Jesus rose from the dead!' },
        { icon:'🔥', title:'The Holy Spirit',     verse:'Acts 2',      age:'5+', color:['#ff7043','#bf360c'], fun:'Fire sat on each person — God filled them up!' },
      ],
    };

    /* Guide characters that appear at story stops */
    const GUIDES = {
      3:  { char:'👧', msg:"You're doing great!", nt:'Wow, keep going!' },
      7:  { char:'👦', msg:'Halfway there, explorer!', nt:'You\'re amazing!' },
      11: { char:'🐑', msg:'Almost finished!', nt:'Nearly there!' },
    };

    /* ── State ──────────────────────────────────── */
    let current = 'OT';
    const read = { OT: new Set(), NT: new Set() };

    /* ── Render timeline ────────────────────────── */
    function renderTimeline(testament) {
      const track = document.getElementById('tl-track');
      const path  = document.getElementById('tl-path');
      const stories = STORIES[testament];

      // Update path colour
      path.className = 'tl-path' + (testament === 'NT' ? ' nt' : '');

      // Clear existing stops (keep path)
      [...track.children].forEach(c => { if (c !== path) c.remove(); });

      stories.forEach((s, i) => {
        // Insert guide character before stop (at certain indices)
        if (GUIDES[i]) {
          const g = GUIDES[i];
          const gStop = document.createElement('div');
          gStop.className = 'guide-stop';
          gStop.style.animationDelay = `${i * 0.06}s`;
          gStop.innerHTML = `
            <div class="guide-bubble">${testament === 'OT' ? g.msg : g.nt}</div>
            <div class="guide-char">${g.char}</div>
            <div class="guide-stem"></div>
            <div class="guide-node"></div>`;
          track.appendChild(gStop);
        }

        const done = read[testament].has(i);
        const stop = document.createElement('div');
        stop.className = 'stop';
        stop.style.animationDelay = `${i * 0.06}s`;
        stop.setAttribute('role', 'button');
        stop.setAttribute('aria-label', `Story ${i + 1}: ${s.title}`);

        const bgGrad = `linear-gradient(155deg, ${s.color[0]}, ${s.color[1]})`;
        const cardClass = `card card-${testament === 'OT' ? 'ot' : 'nt'}${done ? ' done' : ''}`;

        stop.innerHTML = `
          <div class="${cardClass}">
            <div class="card-art" style="background:${bgGrad}">
              <div class="card-num">${i + 1}</div>
              <span class="card-icon" style="--d:${2.8 + Math.random() * 0.8}s; animation-delay:${Math.random() * 0.5}s">${s.icon}</span>
            </div>
            <div class="card-body">
              <div class="card-title">${s.title}</div>
              <div class="card-verse">${s.verse}</div>
              <div class="card-meta">
                <span class="age-tag">Ages ${s.age}</span>
              </div>
              <button class="read-btn" tabindex="-1">
                ${done ? '✓ Read Again' : 'Read Story →'}
              </button>
            </div>
          </div>
          <div class="stem" style="background:linear-gradient(to bottom,${s.color[0]},${s.color[1]})"></div>
          <div class="node${done ? ' done' : ''}" style="${done ? '' : `background:${s.color[1]}`}">${done ? '✓' : i + 1}</div>`;

        stop.onclick = () => openStory(testament, i);
        track.appendChild(stop);
      });

      updateProgress(testament);
    }

    /* ── Open a story ───────────────────────────── */
    function openStory(testament, index) {
      const s = STORIES[testament][index];
      read[testament].add(index);

      // Show modal
      document.getElementById('modal-icon').textContent  = s.icon;
      document.getElementById('modal-title').textContent = s.title;
      document.getElementById('modal-text').textContent  =
        `📖 ${s.verse}\n\n💡 Fun fact: ${s.fun}`;
      document.getElementById('modal').classList.add('show');

      // Re-render to update done state
      renderTimeline(testament);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    /* ── Update progress ────────────────────────── */
    function updateProgress(testament) {
      const done  = read[testament].size;
      const total = STORIES[testament].length;
      const pct   = (done / total) * 100;

      document.getElementById('progress-pill').textContent = `${done} / ${total}`;
      document.getElementById('progress-bar').style.width  = `${pct}%`;
      document.getElementById('progress-bar').className    =
        'progress-bar-fill' + (testament === 'NT' ? ' nt' : '');
    }

    /* ── Switch testament ───────────────────────── */
    function switchTestament(t) {
      current = t;
      document.getElementById('btn-ot').classList.toggle('active', t === 'OT');
      document.getElementById('btn-nt').classList.toggle('active', t === 'NT');
      document.getElementById('tl-title').textContent =
        t === 'OT' ? 'Old Testament Journey' : 'New Testament Journey';
      document.getElementById('tl-sub').textContent =
        t === 'OT' ? '14 epic adventures — tap a story to begin!'
                   : '14 stories about Jesus — tap one to start!';
      renderTimeline(t);
      document.getElementById('tl-scroll').scrollLeft = 0;
    }

    /* ── Init ───────────────────────────────────── */
    renderTimeline('OT');

    /* ── Check URL param for direct NT link ─────── */
    if (new URLSearchParams(location.search).get('t') === 'NT') {
      switchTestament('NT');
    }
  </script>
</body>
</html>
